# secondary-nav-props.yml
#
# Secondary Nav component property definitions.
# This file is the single source of truth for both Storybook controls
# and MDX documentation tables.

themeColor:
  twigProp: menu_theme
  name: Component Theme (dial)
  type: select
  required: false
  description: Color theme applied to the secondary navigation component
  detail: >
    Applies a color theme to the secondary nav. Options are derived from the
    component-themes design tokens. Maps to menu_theme in the Twig template.
  default: one
  options:
    - one
    - two
    - three
    - four
    - five
  control: select
