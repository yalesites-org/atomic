# page-title-props.yml
#
# Page Title component property definitions.
# This file is the single source of truth for both Storybook controls
# and MDX documentation tables.
#
# Edit descriptions and details freely - changes appear in Storybook on reload.

meta:
  twigProp: page_title__meta
  name: Meta
  type: string
  required: false
  description: Meta information displayed below the page title (supports HTML)
  control: text

prefix:
  twigProp: page_title__prefix
  name: Page Title Prefix
  type: string
  required: false
  description: Optional prefix text displayed above the heading
  control: text

socialLinks:
  twigProp: page_title__show_social_media_sharing_links
  name: Social Links
  type: boolean
  required: false
  description: Whether to display social media sharing links
  default: false
  control: boolean
