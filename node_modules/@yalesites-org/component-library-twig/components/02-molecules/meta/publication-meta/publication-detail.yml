publication_detail__citation: '<p>Scott Morton, Fiona M., and Robert L. Williams. (2018). <em>The Connecticut Individual Healthcare Responsibility Fee</em>. Yale University Institution for Social and Policy Studies.</p>'
publication_detail__description: ''
publication_detail__abstract: '<p>The paper proposes that all residents of the state of Connecticut take responsibility for their healthcare costs by paying the actuarially fair price of an insurance policy for which they are eligible. Currently, individuals who do not enroll in coverage shift their costs to those who are insured. The authors estimate that the rule could lower premiums by 3 percent to 12 percent, with savings as high as $1,000 per enrollee due to the lower cost profile of the new insureds.</p>'
