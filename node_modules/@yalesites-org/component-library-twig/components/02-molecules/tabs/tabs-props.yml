# tabs-props.yml
#
# Tabs component property definitions.
# This file is the single source of truth for both Storybook controls
# and MDX documentation tables.
#
# Edit descriptions and details freely - changes appear in Storybook on reload.

tabsTheme:
  twigProp: tabs__theme
  name: Tabs Theme (dial)
  type: select
  required: false
  description: Color accent theme for this component (from color dial in CMS)
  default: one
  options:
    - one
    - two
    - three
    - four
    - five
  control: select
