related_content__heading: 'Related Content'
# In Storybook the `related_content__view` variable is built per-story from
# this list. In Drupal the variable arrives pre-rendered from the embedded
# entity_reference_for_fields view (embed_related_content display) which
# uses row plugin entity:node + view_mode related_content_card. Each row
# renders through node--related-content-card.html.twig in atomic.
#
# `category` is optional — Profile bundle has no field_category, so its
# eyebrow shows only the bundle label. Storybook fixture mirrors that
# variation so the no-category branch is visible in preview.
